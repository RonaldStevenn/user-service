name: CI

on:
  push:
    branches: [ master, main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: temurin
          cache: maven

      - name: Grant execute permission for Maven
        run: chmod +x mvnw
    
      - name: Build and test
        run: ./mvnw clean package